name: Dast Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar repo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Instalar Node
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # 4. Levantar backend
    - name: Start backend
      run: |
        cd backend &&
        npm install &&
        npm start &
        sleep 15
    # 5. Levantar frontend
    - name: Start frontend
      run: |
        cd frontend &&
        npm install &&
        npm start &
        sleep 15
    # Permisos mínimos para escribir reportes sin alterar modos del repo
    - name: Prepare DAST reports directory
      run: mkdir -p reports/DAST
    # 8. Ejecutar OWASP ZAP frontend
    - name: Run OWASP ZAP full scan
      run: |
        docker run --network="host" \
          -v $(pwd):/zap/wrk \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-full-scan.py \
          -t http://localhost:3000 \
          -j \
          -r reports/DAST/zap-report.html \
          -J reports/DAST/zap.json \
          -I

    # 9. Ejecutar OWASP ZAP backend
    - name: Run OWASP ZAP full scan on backend
      run: |
        docker run --network="host" \
          -v $(pwd):/zap/wrk \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-full-scan.py \
          -t http://localhost:3001 \
          -n /zap/wrk/zap.context \
          -r reports/DAST/zap-report-backend.html \
          -J reports/DAST/zap-backend.json \
          -z "-config spider.seedUrls=/zap/wrk/zap-urls.txt" \
          -I

    # 10. Guardar reportes
    - name: Upload ZAP reports
      uses: actions/upload-artifact@v4
      with:
        name: zap-reports
        path: reports/DAST/
    # 11. Commit y push de los reportes al repositorio
    - name: Commit ZAP reports to repository
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git config core.fileMode false
        git pull --rebase origin "$GITHUB_REF_NAME"
        git add reports/DAST/
        git commit -m "ci: add ZAP DAST reports [skip ci]" || echo "No changes to commit"
        git push origin "HEAD:$GITHUB_REF_NAME" || (git pull --rebase origin "$GITHUB_REF_NAME" && git push origin "HEAD:$GITHUB_REF_NAME")
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}