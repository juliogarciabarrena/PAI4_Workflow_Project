name: Test DefectDojo Upload

on:
  workflow_dispatch:

jobs:
  upload-semgrep:
    runs-on: ubuntu-latest

    env:
      DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
      DEFECTDOJO_TOKEN: ${{ secrets.DEFECTDOJO_TOKEN }}

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Crear carpeta de reportes
        run: mkdir -p reports

      - name: Ejecutar Semgrep
        continue-on-error: true
        run: |
          docker run --rm -v "${PWD}:/src" semgrep/semgrep semgrep scan \
            --config=p/owasp-top-ten \
            --json \
            -o /src/reports/semgrep.json \
            /src || true

      - name: Comprobar que el reporte existe
        run: |
          ls -la reports
          test -s reports/semgrep.json
          head -c 500 reports/semgrep.json

      - name: Preparar script de subida
        run: |
          sed -i 's/\r$//' scripts/upload_to_defectdojo.sh
          chmod +x scripts/upload_to_defectdojo.sh

      - name: Subir Semgrep a DefectDojo
        run: |
          ./scripts/upload_to_defectdojo.sh \
            "Semgrep JSON Report" \
            "reports/semgrep.json" \
            "SAST Semgrep"

      - name: Guardar reporte como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep.json