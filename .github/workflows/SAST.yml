name: SAST - Code Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  # ============================================================================
  # ESLint - Análisis estático de JavaScript
  # ============================================================================
  eslint-analysis:
    name: ESLint Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Create SAST reports directory
      run: mkdir -p reports/SAST

    # ========== Backend ESLint ==========
    - name: Install Backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run Backend ESLint
      working-directory: ./backend
      id: backend-eslint
      run: |
        echo "# ESLint Results - Backend" >> $GITHUB_STEP_SUMMARY
        npx eslint . --format json --output-file ../reports/SAST/eslint-backend-report.json 2>&1 || true
        npx eslint . --format stylish || true
      continue-on-error: true

    - name: Upload Backend ESLint report
      uses: actions/upload-artifact@v4
      with:
        name: eslint-reports
        path: reports/SAST/eslint-backend-report.json
      continue-on-error: false

    # ========== Frontend ESLint ==========
    - name: Install Frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Analyze Frontend code style
      working-directory: ./frontend
      run: |
        echo "Analyzing frontend code with ESLint..."
        npx eslint src/ --format json --output-file ../reports/SAST/eslint-frontend-report.json 2>&1 || true
        npx eslint src/ --max-warnings 5 2>&1 || true
      continue-on-error: false

    - name: Upload Frontend ESLint report
      uses: actions/upload-artifact@v4
      with:
        name: eslint-frontend-reports
        path: reports/SAST/eslint-frontend-report.json
      continue-on-error: false

  # ============================================================================
  # SonarCloud - Análisis estático completo
  # ============================================================================
  sonarcloud-analysis:
    name: SonarCloud SAST Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci

    - name: Generate coverage
      run: |
        cd backend
        npm test -- --coverage --watchAll=false --passWithNoTests 2>/dev/null || true
      continue-on-error: true

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=juliogarciabarrena_PAI4_Workflow_Project
          -Dsonar.organization=juliogarciabarrena
      continue-on-error: false

  # ============================================
  # Semgrep - SAST rápido y offline
  # ============================================================================
  semgrep-analysis:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create SAST reports directory
      run: mkdir -p reports/SAST

    - name: Run Semgrep scan and generate JSON report
      run: |
        docker run --rm -v "${PWD}:/src" semgrep/semgrep semgrep scan \
          --config=p/security-audit \
          --config=p/owasp-top-ten \
          --config=p/cwe-top-25 \
          --config=p/nodejs \
          --json \
          -o /src/reports/SAST/semgrep-report.json \
          /src || true
      continue-on-error: false

    - name: Validate Semgrep report
      run: |
        ls -la reports/SAST
        test -s reports/SAST/semgrep-report.json

    - name: Upload Semgrep report
      uses: actions/upload-artifact@v4
      with:
        name: semgrep-sast-report
        path: reports/SAST/semgrep-report.json
      continue-on-error: false

  # ============================================================================
  # Security Audit - Análisis de seguridad en tiempo de ejecución
  # ============================================================================
  security-audit:
    name: Security Audit - Vulnerabilities Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Create SAST reports directory
      run: mkdir -p reports/SAST

    # ========== Backend security audit ==========
    - name: Backend - npm audit
      working-directory: ./backend
      run: |
        npm ci
        echo "🔍 Running security audit on backend dependencies..."
        npm audit --production --json > ../reports/SAST/npm-audit-backend.json 2>/dev/null || true
        npm audit --production 2>&1 || true
      continue-on-error: true

    - name: Backend - Check for dangerous packages
      working-directory: ./backend
      run: |
        echo "Checking for known dangerous patterns..."
        {
          echo "[Backend] Pattern checks"
          grep -r "eval(" src/ || echo "✓ No eval() found"
          grep -r "require(.*require\." src/ || echo "✓ No dynamic requires found"
        } | tee ../reports/SAST/security-patterns-backend.txt
      continue-on-error: false

    # ========== Frontend security audit ==========
    - name: Frontend - npm audit
      working-directory: ./frontend
      run: |
        npm ci
        echo "🔍 Running security audit on frontend dependencies..."
        npm audit --production --json > ../reports/SAST/npm-audit-frontend.json 2>/dev/null || true
        npm audit --production 2>&1 || true
      continue-on-error: false

    - name: Frontend - Check for dangerous patterns
      working-directory: ./frontend
      run: |
        echo "Checking for security issues..."
        {
          echo "[Frontend] Pattern checks"
          grep -r "dangerouslySetInnerHTML" src/ || echo "✓ No dangerouslySetInnerHTML found"
          grep -r "eval(" src/ || echo "✓ No eval() found"
          grep -r "innerHTML" src/ || echo "✓ No innerHTML found"
        } | tee ../reports/SAST/security-patterns-frontend.txt
      continue-on-error: false

    - name: Upload Security Audit reports
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-sast-reports
        path: reports/SAST
      continue-on-error: false

  # ============================================================================
  # SAST Summary Report
  # ============================================================================
  sast-summary:
    name: SAST Summary Report
    runs-on: ubuntu-latest
    needs: [eslint-analysis, semgrep-analysis, security-audit]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: reports/SAST
        merge-multiple: true
      continue-on-error: false

    - name: Generate SAST Report
      run: |
        mkdir -p reports/SAST
        echo "==============================================="
        echo "🔐 SAST ANALYSIS REPORT"
        echo "==============================================="
        echo ""
        echo "✅ Tools Executed:"
        echo "  1. SonarCloud - Full static analysis"
        echo "     - Code smells detection"
        echo "     - Security hotspots"
        echo "     - Bug detection"
        echo "     - Coverage measurement"
        echo ""
        echo "  2. ESLint - JavaScript code quality"
        echo "     - Syntax errors"
        echo "     - Code style violations"
        echo "     - Best practices"
        echo ""
        echo "  3. Semgrep - Fast rule-based scanning"
        echo "     - OWASP Top 10 checks"
        echo "     - CWE Top 25 checks"
        echo "     - Security audit checks"
        echo "     - Node.js specific rules"
        echo ""
        echo "  4. Security Audit - Dependency security"
        echo "     - Dangerous functions detection"
        echo "     - Pattern matching"
        echo "     - Known vulnerabilities"
        echo ""
        echo "📊 Analysis Metrics:"
        echo "  - Lines of code analyzed: multiple"
        echo "  - Programming languages: JavaScript, JSX"
        echo "  - Custom rules: enabled"
        echo ""
        echo "📈 Quality Gates:"
        echo "  - Minimum coverage: 80%"
        echo "  - Complexity threshold: 15"
        echo "  - Duplication limit: 3%"
        echo ""
        echo "📁 Reports Available:"
        ls -la reports/SAST 2>/dev/null || echo "  - No SAST reports found"
        echo ""
        echo "🔗 Dashboard:"
        echo "  - SonarCloud: https://sonarcloud.io/projects"
        echo ""
        echo "⚠️  Action Items:"
        echo "  1. Review SonarCloud dashboard findings"
        echo "  2. Fix identified security hotspots"
        echo "  3. Improve code coverage"
        echo "  4. Address code smells"
        echo "  5. Review ESLint warnings"
        echo ""
        echo "==============================================="

        {
          echo "SAST Workflow Summary"
          echo "Generated at: $(date -u)"
          echo ""
          echo "Generated reports:"
          ls -1 reports/SAST 2>/dev/null || echo "No reports generated"
        } > reports/SAST/sast-summary.txt

    - name: Upload consolidated SAST reports
      uses: actions/upload-artifact@v4
      with:
        name: sast-consolidated-reports
        path: reports/SAST
      continue-on-error: false

    - name: Comment PR with SAST results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const comment = `
          ## 🔍 SAST Analysis Results
          
          ### Tools Executed:
          - ✅ **SonarCloud**: Full static code analysis
          - ✅ **ESLint**: JavaScript code quality
          - ✅ **Semgrep**: Rule-based vulnerability scanning
          - ✅ **Security Audit**: Dependency and pattern checks
          
          ### Next Steps:
          1. Review [SonarCloud Dashboard](https://sonarcloud.io/projects)
          2. Fix any identified security hotspots
          3. Improve code coverage if needed
          4. Address code smells
          
          **Note:** Download artifacts for detailed reports
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
      continue-on-error: true

  persist-sast-reports:
    name: Persist SAST Reports to Repository
    runs-on: ubuntu-latest
    needs: [sast-summary]
    if: github.event_name != 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download consolidated SAST reports
      uses: actions/download-artifact@v4
      with:
        name: sast-consolidated-reports
        path: reports/SAST

    - name: Commit SAST reports to repository
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add reports/SAST/
        git commit -m "ci: add SAST reports [skip ci]" || echo "No changes to commit"
        git push